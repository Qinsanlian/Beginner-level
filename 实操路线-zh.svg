<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2180" viewBox="0 0 1600 2180">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .title { font-family: Inter, Arial, sans-serif; font-size: 46px; font-weight: 800; fill: #f8fafc; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 22px; fill: #cbd5e1; }
      .section-title { font-family: Inter, Arial, sans-serif; font-size: 28px; font-weight: 800; fill: #f8fafc; }
      .node-title { font-family: Inter, Arial, sans-serif; font-size: 25px; font-weight: 800; fill: #f8fafc; }
      .node-text { font-family: Inter, Arial, sans-serif; font-size: 18px; fill: #e2e8f0; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 16px; fill: #cbd5e1; }
      .tiny { font-family: Inter, Arial, sans-serif; font-size: 14px; fill: #94a3b8; }
      .core { fill: #172554; stroke: #3b82f6; stroke-width: 2; rx: 24; }
      .evidence { fill: #052e16; stroke: #22c55e; stroke-width: 2; rx: 22; }
      .phase { fill: #1e293b; stroke: #475569; stroke-width: 2; rx: 22; }
      .gate { fill: #3f1d0b; stroke: #f97316; stroke-width: 2; rx: 22; }
      .advanced { fill: #312e81; stroke: #8b5cf6; stroke-width: 2; rx: 22; }
      .warning { fill: #450a0a; stroke: #ef4444; stroke-width: 2; rx: 22; }
      .cs { fill: #0e7490; stroke: #67e8f9; stroke-width: 2; rx: 20; }
      .line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrow); }
      .badge { fill: #020617; stroke: #334155; stroke-width: 1.5; rx: 14; }
      .badge-text { font-family: Inter, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #cbd5e1; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="2180"/>

  <text class="title" x="800" y="86" text-anchor="middle">落实版技能树 v2.1</text>
  <text class="subtitle" x="800" y="126" text-anchor="middle">高上限 · 低泡沫 · 强证据 · 24-27 个月工程路线图</text>

  <rect class="core" x="110" y="180" width="1380" height="160" filter="url(#shadow)"/>
  <text class="section-title" x="150" y="230">定位</text>
  <text class="node-text" x="150" y="270">当前状态：工程零基础，但强反思、AI 协作敏感度和长期投入可加速学习。</text>
  <text class="node-text" x="150" y="306">目标：初级后端 / DevOps / 测试开发方向入门，长期关注后端基础设施与可靠性工程。</text>

  <rect class="evidence" x="110" y="380" width="1380" height="170" filter="url(#shadow)"/>
  <text class="section-title" x="150" y="430">全局硬前置</text>
  <text class="node-text" x="150" y="470">英文：README、issue 笔记、API 文档、RCA、项目讲解。</text>
  <text class="node-text" x="150" y="505">证据：仓库链接、提交记录、测试、运行日志、限制说明、排障笔记。</text>
  <text class="node-text" x="150" y="540">AI 纪律：AI 是教练、审查员和练习对手；绝不作弊替代理解。</text>

  <path class="line" d="M800 550 L800 615"/>

  <rect class="phase" x="110" y="620" width="310" height="180" filter="url(#shadow)"/>
  <text class="node-title" x="140" y="665">阶段 0</text>
  <text class="small" x="140" y="695">第 0-4 周</text>
  <text class="node-text" x="140" y="730">重置执行系统</text>
  <text class="tiny" x="140" y="760">Git、Python 环境、极小 CLI</text>
  <text class="tiny" x="140" y="782">零基础允许 3-4 周</text>

  <rect class="phase" x="465" y="620" width="310" height="180" filter="url(#shadow)"/>
  <text class="node-title" x="495" y="665">阶段 1</text>
  <text class="small" x="495" y="695">第 1-3 个月</text>
  <text class="node-text" x="495" y="730">Python + 计算机基础</text>
  <text class="tiny" x="495" y="760">CLI、pytest、日志、GitHub</text>
  <text class="tiny" x="495" y="782">进程、HTTP、DNS、TCP 基础</text>

  <rect class="phase" x="820" y="620" width="310" height="180" filter="url(#shadow)"/>
  <text class="node-title" x="850" y="665">Go 预热</text>
  <text class="small" x="850" y="695">阶段 2 前 1 周</text>
  <text class="node-text" x="850" y="730">降低语言切换冲击</text>
  <text class="tiny" x="850" y="760">Go Tour、测试、极简 HTTP 处理</text>
  <text class="tiny" x="850" y="782">Python 错误 vs Go 错误</text>

  <rect class="phase" x="1175" y="620" width="310" height="180" filter="url(#shadow)"/>
  <text class="node-title" x="1205" y="665">阶段 2</text>
  <text class="small" x="1205" y="695">第 4-7 个月</text>
  <text class="node-text" x="1205" y="730">Go 与 HTTP 服务</text>
  <text class="tiny" x="1205" y="760">handler、中间件、Docker</text>
  <text class="tiny" x="1205" y="782">第一个真正的难度峰值</text>

  <path class="line" d="M420 710 L465 710"/>
  <path class="line" d="M775 710 L820 710"/>
  <path class="line" d="M1130 710 L1175 710"/>
  <path class="line" d="M1330 800 C1330 870 270 870 270 940"/>

  <rect class="phase" x="110" y="945" width="310" height="180" filter="url(#shadow)"/>
  <text class="node-title" x="140" y="990">阶段 3</text>
  <text class="small" x="140" y="1020">第 8-10 个月</text>
  <text class="node-text" x="140" y="1055">后端工程闭环</text>
  <text class="tiny" x="140" y="1085">PostgreSQL、Redis、CI、API</text>
  <text class="tiny" x="140" y="1107">事故追踪器 / 任务 API</text>

  <rect class="phase" x="465" y="945" width="310" height="180" filter="url(#shadow)"/>
  <text class="node-title" x="495" y="990">阶段 4</text>
  <text class="small" x="495" y="1020">第 11-13 个月</text>
  <text class="node-text" x="495" y="1055">Linux 与网络排障</text>
  <text class="tiny" x="495" y="1085">curl、dig、ss、lsof、RCA</text>
  <text class="tiny" x="495" y="1107">故障实验室 A：单机/Docker</text>

  <rect class="phase" x="820" y="945" width="310" height="180" filter="url(#shadow)"/>
  <text class="node-title" x="850" y="990">阶段 5</text>
  <text class="small" x="850" y="1020">第 14-17 个月</text>
  <text class="node-text" x="850" y="1055">容器与 K8s 实用层</text>
  <text class="tiny" x="850" y="1085">Pod、Service、探针、滚动更新</text>
  <text class="tiny" x="850" y="1107">故障实验室 B：Kubernetes</text>

  <rect class="phase" x="1175" y="945" width="310" height="180" filter="url(#shadow)"/>
  <text class="node-title" x="1205" y="990">阶段 6</text>
  <text class="small" x="1205" y="1020">第 18-20 个月</text>
  <text class="node-text" x="1205" y="1055">可观测性与 SRE 入门</text>
  <text class="tiny" x="1205" y="1085">指标、日志、链路、runbook</text>
  <text class="tiny" x="1205" y="1107">仅在实验室扎实时才用 3 个月</text>

  <path class="line" d="M420 1035 L465 1035"/>
  <path class="line" d="M775 1035 L820 1035"/>
  <path class="line" d="M1130 1035 L1175 1035"/>
  <path class="line" d="M1330 1125 C1330 1180 800 1180 800 1235"/>

  <rect class="phase" x="590" y="1240" width="420" height="170" filter="url(#shadow)"/>
  <text class="node-title" x="625" y="1285">阶段 7</text>
  <text class="small" x="625" y="1315">第 21-24 / 27 个月</text>
  <text class="node-text" x="625" y="1350">云、IaC、CI/CD 与简历</text>
  <text class="tiny" x="625" y="1380">AWS/GCP、Terraform、发布</text>
  <text class="tiny" x="625" y="1402">24 个月 = 高强度目标线</text>

  <rect class="gate" x="110" y="1460" width="1380" height="250" filter="url(#shadow)"/>
  <text class="section-title" x="150" y="1510">门禁：证据胜过口号</text>
  <text class="node-text" x="150" y="1550">阶段 0-1：CLI 工具、pytest、英文 README、有意义提交、轻量计算机基础。</text>
  <text class="node-text" x="150" y="1585">Go 预热 + 阶段 2：Go 服务、显式错误、测试、Docker、API 文档。</text>
  <text class="node-text" x="150" y="1620">阶段 3-5：后端闭环加故障实验室 A/B：单机、Docker 与 K8s 故障复现。</text>
  <text class="node-text" x="150" y="1655">阶段 6-7：可观测性案例、发布记录、风险清单、简历就绪证据。</text>
  <text class="tiny" x="150" y="1690">无门禁 = 无简历关键词。</text>

  <path class="line" d="M800 1710 L800 1765"/>

  <rect class="evidence" x="110" y="1770" width="420" height="250" filter="url(#shadow)"/>
  <text class="node-title" x="145" y="1820">核心项目 1</text>
  <text class="small" x="145" y="1850">Python 工具项目</text>
  <text class="node-text" x="145" y="1895">证明脚本、测试、</text>
  <text class="node-text" x="145" y="1930">英文文档与 CLI 交付能力。</text>
  <text class="tiny" x="145" y="1980">日志分析器 / 健康检查器</text>

  <rect class="evidence" x="590" y="1770" width="420" height="250" filter="url(#shadow)"/>
  <text class="node-title" x="625" y="1820">核心项目 2</text>
  <text class="small" x="625" y="1850">Go 后端项目</text>
  <text class="node-text" x="625" y="1895">证明 API、数据库、Redis、</text>
  <text class="node-text" x="625" y="1930">Docker、CI 与测试循环。</text>
  <text class="tiny" x="625" y="1980">事故追踪器 / 运行时间监控</text>

  <rect class="evidence" x="1070" y="1770" width="420" height="250" filter="url(#shadow)"/>
  <text class="node-title" x="1105" y="1820">核心项目 3</text>
  <text class="small" x="1105" y="1850">可观测性与排障实验室</text>
  <text class="node-text" x="1105" y="1895">证明 Linux、K8s、RCA、</text>
  <text class="node-text" x="1105" y="1930">指标、日志与链路追踪。</text>
  <text class="tiny" x="1105" y="1980">故障实验室 A/B、告警、runbook</text>

  <rect class="warning" x="110" y="2070" width="1380" height="70" filter="url(#shadow)"/>
  <text class="node-text" x="150" y="2112">原则：高强度执行下 24 个月可行；25-27 个月是稳定的现实线。门禁不可绕过。</text>
</svg>
