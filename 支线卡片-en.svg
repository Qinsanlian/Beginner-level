<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="2550" viewBox="0 0 3200 2550" role="img" aria-label="Side Quest Cards v1">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      text{font-family:Inter,Arial,sans-serif}
      .title{font-size:56px;font-weight:900;fill:#f8fafc;letter-spacing:.3px}
      .subtitle{font-size:24px;fill:#cbd5e1}
      .section{font-size:22px;font-weight:850;fill:#f8fafc}
      .cardTitle{font-size:28px;font-weight:880;fill:#f8fafc}
      .cardSub{font-size:18px;font-weight:720;fill:#cbd5e1}
      .item{font-size:18px;fill:#e2e8f0}
      .small{font-size:15px;fill:#94a3b8}
      .gateText{font-size:17px;font-weight:820;fill:#fff7ed}
      .root{fill:#0f172a;stroke:#38bdf8;stroke-width:3;rx:34}
      .zone{fill-opacity:.16;stroke-width:2.5;rx:30}
      .card{stroke-width:2.4;rx:24;filter:url(#shadow)}
      .blue{fill:#172554;stroke:#60a5fa}.green{fill:#052e16;stroke:#86efac}.amber{fill:#3f2d0b;stroke:#facc15}.red{fill:#450a0a;stroke:#fca5a5}.purple{fill:#312e81;stroke:#c084fc}.cyan{fill:#164e63;stroke:#67e8f9}.slate{fill:#1e293b;stroke:#94a3b8}.teal{fill:#134e4a;stroke:#5eead4}.rose{fill:#4c0519;stroke:#fb7185}
      .gate{fill:#7f1d1d;stroke:#fca5a5;stroke-width:1.6;rx:12}
    </style>
  </defs>

  <rect width="3200" height="2550" fill="url(#bg)"/>

  <g opacity="0.14">
    <path d="M0 0H3200M0 100H3200M0 200H3200M0 300H3200M0 400H3200M0 500H3200M0 600H3200M0 700H3200M0 800H3200M0 900H3200M0 1000H3200M0 1100H3200M0 1200H3200M0 1300H3200M0 1400H3200M0 1500H3200M0 1600H3200M0 1700H3200M0 1800H3200M0 1900H3200M0 2000H3200M0 2100H3200M0 2200H3200M0 2300H3200M0 2400H3200M0 2500H3200" stroke="#334155"/>
    <path d="M0 0V2550M100 0V2550M200 0V2550M300 0V2550M400 0V2550M500 0V2550M600 0V2550M700 0V2550M800 0V2550M900 0V2550M1000 0V2550M1100 0V2550M1200 0V2550M1300 0V2550M1400 0V2550M1500 0V2550M1600 0V2550M1700 0V2550M1800 0V2550M1900 0V2550M2000 0V2550M2100 0V2550M2200 0V2550M2300 0V2550M2400 0V2550M2500 0V2550M2600 0V2550M2700 0V2550M2800 0V2550M2900 0V2550M3000 0V2550M3100 0V2550M3200 0V2550" stroke="#334155"/>
  </g>

  <rect class="root" x="700" y="60" width="1800" height="140" filter="url(#shadow)"/>
  <text class="title" x="1600" y="120" text-anchor="middle">&#x4E24;&#x5E74;&#x652F;&#x7EBF;&#x76EE;&#x6807;&#x5361;&#x7247; v1</text>
  <text class="subtitle" x="1600" y="162" text-anchor="middle">Support System / Anti-Anxiety / Career Radar / Sustainable Execution</text>

  <rect class="zone" x="80" y="260" width="3040" height="430" fill="#1e3a8a" stroke="#60a5fa"/>
  <rect class="zone" x="80" y="735" width="3040" height="900" fill="#14532d" stroke="#86efac"/>
  <rect class="zone" x="80" y="1680" width="3040" height="530" fill="#4c1d95" stroke="#c084fc"/>
  <rect class="zone" x="80" y="2255" width="3040" height="210" fill="#7f1d1d" stroke="#fca5a5"/>

  <text class="section" x="115" y="300">Positioning and Operating Contract</text>
  <text class="section" x="115" y="775">Side Quest Systems</text>
  <text class="section" x="115" y="1720">Timeline and External Calibration</text>
  <text class="section" x="115" y="2295">Final Principle</text>

  <g>
    <rect class="card blue" x="120" y="330" width="720" height="310"/>
    <text class="cardTitle" x="155" y="380">What This Is</text>
    <text class="cardSub" x="155" y="414">Not a technical roadmap</text>
    <text class="item" x="155" y="462">- supports the main skill tree</text>
    <text class="item" x="155" y="498">- protects long-term execution</text>
    <text class="item" x="155" y="534">- reduces anxiety-driven route changes</text>
    <text class="item" x="155" y="570">- keeps life, feedback, and career radar stable</text>
  </g>

  <g>
    <rect class="card green" x="900" y="330" width="720" height="310"/>
    <text class="cardTitle" x="935" y="380">Two-Year Outcome</text>
    <text class="cardSub" x="935" y="414">A stable personal operating system</text>
    <text class="item" x="935" y="462">- body can handle long-term learning</text>
    <text class="item" x="935" y="498">- emotions do not rewrite the plan</text>
    <text class="item" x="935" y="534">- information intake stays clean</text>
    <text class="item" x="935" y="570">- communication becomes reliable and cooperative</text>
  </g>

  <g>
    <rect class="card red" x="1680" y="330" width="720" height="310"/>
    <text class="cardTitle" x="1715" y="380">Non-Overlap Rule</text>
    <text class="cardSub" x="1715" y="414">Do not duplicate the main tree</text>
    <text class="item" x="1715" y="462">- no language or framework details</text>
    <text class="item" x="1715" y="498">- no backend or cloud implementation details</text>
    <text class="item" x="1715" y="534">- no debugging tool expansion</text>
    <text class="item" x="1715" y="570">- if it becomes technical, move it back to main tree</text>
  </g>

  <g>
    <rect class="card amber" x="2460" y="330" width="620" height="310"/>
    <text class="cardTitle" x="2495" y="380">Core Rule</text>
    <text class="cardSub" x="2495" y="414">Side quests serve the main quest</text>
    <text class="item" x="2495" y="462">- do not use side tasks to escape hard work</text>
    <text class="item" x="2495" y="498">- do not ignore side risks until collapse</text>
    <text class="item" x="2495" y="534">- no heroic burnout</text>
    <text class="item" x="2495" y="570">- stable beats dramatic</text>
  </g>

  <g>
    <rect class="card green" x="120" y="825" width="560" height="300"/>
    <text class="cardTitle" x="155" y="875">A. Body Endurance</text>
    <text class="cardSub" x="155" y="908">Do not let the body break the plan</text>
    <text class="item" x="155" y="950">- stable sleep, no late-night heroism</text>
    <text class="item" x="155" y="984">- daily walk or low-intensity movement</text>
    <text class="item" x="155" y="1018">- weekly strength or core training</text>
    <text class="item" x="155" y="1052">- monthly fatigue check</text>
    <rect class="gate" x="155" y="1074" width="390" height="34"/>
    <text class="gateText" x="175" y="1097">Gate: no 2-week silent collapse</text>
  </g>

  <g>
    <rect class="card red" x="730" y="825" width="560" height="300"/>
    <text class="cardTitle" x="765" y="875">B. Anti-Anxiety</text>
    <text class="cardSub" x="765" y="908">Turn pressure into action</text>
    <text class="item" x="765" y="950">- no life decisions at midnight</text>
    <text class="item" x="765" y="984">- no route rewrite after one bad day</text>
    <text class="item" x="765" y="1018">- daily five-line review</text>
    <text class="item" x="765" y="1052">- pressure levels 1-4 with responses</text>
    <rect class="gate" x="765" y="1074" width="390" height="34"/>
    <text class="gateText" x="785" y="1097">Gate: minimum action survives anxiety</text>
  </g>

  <g>
    <rect class="card blue" x="1340" y="825" width="560" height="300"/>
    <text class="cardTitle" x="1375" y="875">C. Execution System</text>
    <text class="cardSub" x="1375" y="908">Make effort measurable</text>
    <text class="item" x="1375" y="950">- deep block, input block, maintenance block</text>
    <text class="item" x="1375" y="984">- recovery block is mandatory</text>
    <text class="item" x="1375" y="1018">- weekly review asks what to delete</text>
    <text class="item" x="1375" y="1052">- bad state: one minimum block only</text>
    <rect class="gate" x="1375" y="1074" width="390" height="34"/>
    <text class="gateText" x="1395" y="1097">Gate: execution before planning</text>
  </g>

  <g>
    <rect class="card cyan" x="1950" y="825" width="560" height="300"/>
    <text class="cardTitle" x="1985" y="875">D. Information Hygiene</text>
    <text class="cardSub" x="1985" y="908">Protect attention from panic content</text>
    <text class="item" x="1985" y="950">- keep sources that produce action</text>
    <text class="item" x="1985" y="984">- limit salary flex and miracle stories</text>
    <text class="item" x="1985" y="1018">- monthly source cleanup</text>
    <text class="item" x="1985" y="1052">- no shortcut addiction</text>
    <rect class="gate" x="1985" y="1074" width="410" height="34"/>
    <text class="gateText" x="2005" y="1097">Gate: input must create action</text>
  </g>

  <g>
    <rect class="card purple" x="2560" y="825" width="520" height="300"/>
    <text class="cardTitle" x="2595" y="875">E. Career Radar</text>
    <text class="cardSub" x="2595" y="908">Observe jobs without self-judgment</text>
    <text class="item" x="2595" y="950">- collect 10 real job posts monthly</text>
    <text class="item" x="2595" y="984">- track requirements and signal noise</text>
    <text class="item" x="2595" y="1018">- update quarterly job map</text>
    <text class="item" x="2595" y="1052">- do not doomscroll job posts</text>
    <rect class="gate" x="2595" y="1074" width="360" height="34"/>
    <text class="gateText" x="2615" y="1097">Gate: radar, not judgment</text>
  </g>

  <g>
    <rect class="card teal" x="120" y="1180" width="560" height="300"/>
    <text class="cardTitle" x="155" y="1230">F. Communication</text>
    <text class="cardSub" x="155" y="1263">Become reliable and cooperative</text>
    <text class="item" x="155" y="1305">- facts over exaggeration</text>
    <text class="item" x="155" y="1339">- state limits honestly</text>
    <text class="item" x="155" y="1373">- ask with context and attempts</text>
    <text class="item" x="155" y="1407">- monthly self-intro and progress report</text>
    <rect class="gate" x="155" y="1429" width="400" height="34"/>
    <text class="gateText" x="175" y="1452">Gate: clear, calm, async-friendly</text>
  </g>

  <g>
    <rect class="card amber" x="730" y="1180" width="560" height="300"/>
    <text class="cardTitle" x="765" y="1230">G. Public Record</text>
    <text class="cardSub" x="765" y="1263">Apprentice log, not guru content</text>
    <text class="item" x="765" y="1305">- weekly max one record</text>
    <text class="item" x="765" y="1339">- what happened, what failed, what changed</text>
    <text class="item" x="765" y="1373">- no route preaching</text>
    <text class="item" x="765" y="1407">- no anxiety-for-attention content</text>
    <rect class="gate" x="765" y="1429" width="400" height="34"/>
    <text class="gateText" x="785" y="1452">Gate: record evidence, not identity</text>
  </g>

  <g>
    <rect class="card green" x="1340" y="1180" width="560" height="300"/>
    <text class="cardTitle" x="1375" y="1230">H. Life Risk Control</text>
    <text class="cardSub" x="1375" y="1263">Use resources without being used by them</text>
    <text class="item" x="1375" y="1305">- track cost and buffer quarterly</text>
    <text class="item" x="1375" y="1339">- no anxiety spending</text>
    <text class="item" x="1375" y="1373">- do not burn reasonable support</text>
    <text class="item" x="1375" y="1407">- avoid low-quality work unless necessary</text>
    <rect class="gate" x="1375" y="1429" width="410" height="34"/>
    <text class="gateText" x="1395" y="1452">Gate: resources buy training time</text>
  </g>

  <g>
    <rect class="card slate" x="1950" y="1180" width="560" height="300"/>
    <text class="cardTitle" x="1985" y="1230">I. Interview Rhythm</text>
    <text class="cardSub" x="1985" y="1263">Prepare early, do not panic early</text>
    <text class="item" x="1985" y="1305">- months 0-6: observe only</text>
    <text class="item" x="1985" y="1339">- months 7-12: low-risk trials</text>
    <text class="item" x="1985" y="1373">- months 13-18: monthly mock interview</text>
    <text class="item" x="1985" y="1407">- months 19-27: fixed application windows</text>
    <rect class="gate" x="1985" y="1429" width="400" height="34"/>
    <text class="gateText" x="2005" y="1452">Gate: feedback, not self-destruction</text>
  </g>

  <g>
    <rect class="card rose" x="2560" y="1180" width="520" height="300"/>
    <text class="cardTitle" x="2595" y="1230">J. Backup Boundaries</text>
    <text class="cardSub" x="2595" y="1263">A buffer, not an identity</text>
    <text class="item" x="2595" y="1305">- do not demonize backup paths</text>
    <text class="item" x="2595" y="1339">- do not use them to excuse delay</text>
    <text class="item" x="2595" y="1373">- do not reject rational support</text>
    <text class="item" x="2595" y="1407">- semiannual boundary check</text>
    <rect class="gate" x="2595" y="1429" width="360" height="34"/>
    <text class="gateText" x="2615" y="1452">Gate: buffer, not escape</text>
  </g>

  <g>
    <rect class="card cyan" x="120" y="1770" width="720" height="340"/>
    <text class="cardTitle" x="155" y="1820">Quarterly Job Map</text>
    <text class="cardSub" x="155" y="1853">Update every 3 months</text>
    <text class="item" x="155" y="1895">- which roles are getting closer?</text>
    <text class="item" x="155" y="1931">- which roles are still too high?</text>
    <text class="item" x="155" y="1967">- which requirements repeat across posts?</text>
    <text class="item" x="155" y="2003">- which words are noise?</text>
    <text class="item" x="155" y="2039">- what evidence is needed next quarter?</text>
  </g>

  <g>
    <rect class="card purple" x="900" y="1770" width="720" height="340"/>
    <text class="cardTitle" x="935" y="1820">External Calibration</text>
    <text class="cardSub" x="935" y="1853">Send the job map to a trusted outside view</text>
    <text class="item" x="935" y="1895">- separate real gaps from early anxiety</text>
    <text class="item" x="935" y="1931">- identify requirements already covered</text>
    <text class="item" x="935" y="1967">- mark JD keyword stuffing and filter noise</text>
    <text class="item" x="935" y="2003">- decide what evidence to add next</text>
    <rect class="gate" x="935" y="2030" width="500" height="36"/>
    <text class="gateText" x="955" y="2054">Purpose: outside view, not judgment</text>
  </g>

  <g>
    <rect class="card green" x="1680" y="1770" width="620" height="340"/>
    <text class="cardTitle" x="1715" y="1820">Feedback System</text>
    <text class="cardSub" x="1715" y="1853">Reality checks prevent closed-door planning</text>
    <text class="item" x="1715" y="1895">- project trial feedback</text>
    <text class="item" x="1715" y="1931">- resume feedback</text>
    <text class="item" x="1715" y="1967">- mock interview feedback</text>
    <text class="item" x="1715" y="2003">- application and rejection feedback</text>
    <rect class="gate" x="1715" y="2030" width="420" height="36"/>
    <text class="gateText" x="1735" y="2054">Feedback is calibration</text>
  </g>

  <g>
    <rect class="card amber" x="2360" y="1770" width="720" height="340"/>
    <text class="cardTitle" x="2395" y="1820">24-27 Month Timeline</text>
    <text class="cardSub" x="2395" y="1853">Side quests by phase</text>
    <text class="item" x="2395" y="1895">- 0-3m: sleep, movement, review, source cleanup</text>
    <text class="item" x="2395" y="1931">- 4-6m: stable rhythm and first job map</text>
    <text class="item" x="2395" y="1967">- 7-12m: low-risk applications and feedback</text>
    <text class="item" x="2395" y="2003">- 13-18m: professional explanation and mocks</text>
    <text class="item" x="2395" y="2039">- 19-27m: fixed application rhythm and calibration</text>
  </g>

  <g>
    <rect class="card red" x="120" y="2325" width="2960" height="105"/>
    <text class="cardTitle" x="155" y="2370">Final Principle</text>
    <text class="item" x="155" y="2410">Main tree decides whether you can be hired. Side quests decide whether you can keep going until that day.</text>
  </g>

  <text class="small" x="1600" y="2495" text-anchor="middle">Do not use side quests to escape the main quest. Do not ignore side risks until the main quest collapses.</text>
</svg>
