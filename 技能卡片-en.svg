<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="2600" viewBox="0 0 3200 2600" role="img" aria-label="Skill Cards v2.1">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      text{font-family:Inter,Arial,sans-serif}
      .title{font-size:56px;font-weight:900;fill:#f8fafc;letter-spacing:.3px}
      .subtitle{font-size:24px;fill:#cbd5e1}
      .section{font-size:22px;font-weight:850;fill:#f8fafc}
      .cardTitle{font-size:28px;font-weight:880;fill:#f8fafc}
      .cardSub{font-size:18px;font-weight:700;fill:#cbd5e1}
      .item{font-size:18px;fill:#e2e8f0}
      .small{font-size:15px;fill:#94a3b8}
      .gateText{font-size:17px;font-weight:800;fill:#fff7ed}
      .root{fill:#0f172a;stroke:#38bdf8;stroke-width:3;rx:34}
      .zone{fill-opacity:.16;stroke-width:2.5;rx:30}
      .card{stroke-width:2.4;rx:24;filter:url(#shadow)}
      .blue{fill:#172554;stroke:#60a5fa}.green{fill:#052e16;stroke:#86efac}.amber{fill:#3f2d0b;stroke:#facc15}.red{fill:#450a0a;stroke:#fca5a5}.purple{fill:#312e81;stroke:#c084fc}.cyan{fill:#164e63;stroke:#67e8f9}.slate{fill:#1e293b;stroke:#94a3b8}
      .gate{fill:#7f1d1d;stroke:#fca5a5;stroke-width:1.6;rx:12}
      .line{stroke:#64748b;stroke-width:2.5;fill:none;opacity:.55}
    </style>
  </defs>

  <rect width="3200" height="2600" fill="url(#bg)"/>

  <g opacity="0.14">
    <path d="M0 0H3200M0 100H3200M0 200H3200M0 300H3200M0 400H3200M0 500H3200M0 600H3200M0 700H3200M0 800H3200M0 900H3200M0 1000H3200M0 1100H3200M0 1200H3200M0 1300H3200M0 1400H3200M0 1500H3200M0 1600H3200M0 1700H3200M0 1800H3200M0 1900H3200M0 2000H3200M0 2100H3200M0 2200H3200M0 2300H3200M0 2400H3200M0 2500H3200M0 2600H3200" stroke="#334155"/>
    <path d="M0 0V2600M100 0V2600M200 0V2600M300 0V2600M400 0V2600M500 0V2600M600 0V2600M700 0V2600M800 0V2600M900 0V2600M1000 0V2600M1100 0V2600M1200 0V2600M1300 0V2600M1400 0V2600M1500 0V2600M1600 0V2600M1700 0V2600M1800 0V2600M1900 0V2600M2000 0V2600M2100 0V2600M2200 0V2600M2300 0V2600M2400 0V2600M2500 0V2600M2600 0V2600M2700 0V2600M2800 0V2600M2900 0V2600M3000 0V2600M3100 0V2600M3200 0V2600" stroke="#334155"/>
  </g>

  <rect class="root" x="720" y="60" width="1760" height="140" filter="url(#shadow)"/>
  <text class="title" x="1600" y="120" text-anchor="middle">&#x843D;&#x5B9E;&#x7248;&#x6280;&#x80FD;&#x5361;&#x7247; v2.1</text>
  <text class="subtitle" x="1600" y="162" text-anchor="middle">High Ceiling / Low Bubble / Strong Evidence / 24-27 Month Roadmap</text>

  <rect class="zone" x="80" y="260" width="3040" height="430" fill="#1e3a8a" stroke="#60a5fa"/>
  <rect class="zone" x="80" y="735" width="3040" height="740" fill="#14532d" stroke="#86efac"/>
  <rect class="zone" x="80" y="1520" width="3040" height="650" fill="#4c1d95" stroke="#c084fc"/>
  <rect class="zone" x="80" y="2215" width="3040" height="280" fill="#7f1d1d" stroke="#fca5a5"/>

  <text class="section" x="115" y="300">Foundation Contract</text>
  <text class="section" x="115" y="775">Execution Stages</text>
  <text class="section" x="115" y="1560">Evidence Projects and Delayed Advanced Layer</text>
  <text class="section" x="115" y="2255">Resume Gates and Anti-Bubble Rules</text>

  <g>
    <rect class="card blue" x="120" y="330" width="720" height="310"/>
    <text class="cardTitle" x="155" y="380">Positioning</text>
    <text class="cardSub" x="155" y="414">Current role: zero-base engineer in training</text>
    <text class="item" x="155" y="462">- Target: junior backend / DevOps-oriented entry</text>
    <text class="item" x="155" y="498">- Long-term: backend infra and reliability</text>
    <text class="item" x="155" y="534">- Low-level entry is acceptable</text>
    <text class="item" x="155" y="570">- Low-level tasks must be done with high discipline</text>
  </g>

  <g>
    <rect class="card green" x="900" y="330" width="720" height="310"/>
    <text class="cardTitle" x="935" y="380">Global Prerequisites</text>
    <text class="cardSub" x="935" y="414">English + evidence + delivery discipline</text>
    <text class="item" x="935" y="462">- README / issue notes / API docs / RCA</text>
    <text class="item" x="935" y="498">- repo link / commits / tests / run logs</text>
    <text class="item" x="935" y="534">- limitations and troubleshooting notes</text>
    <text class="item" x="935" y="570">- every key project must be explainable in English</text>
  </g>

  <g>
    <rect class="card red" x="1680" y="330" width="720" height="310"/>
    <text class="cardTitle" x="1715" y="380">AI Discipline</text>
    <text class="cardSub" x="1715" y="414">AI is coach, reviewer, and sparring partner</text>
    <text class="item" x="1715" y="462">- allowed: explain, review, test ideas, mock interview</text>
    <text class="item" x="1715" y="498">- forbidden: one-click full projects</text>
    <text class="item" x="1715" y="534">- forbidden: code you cannot explain</text>
    <text class="item" x="1715" y="570">- LLM API demo is not AI Infra</text>
  </g>

  <g>
    <rect class="card amber" x="2460" y="330" width="620" height="310"/>
    <text class="cardTitle" x="2495" y="380">Time Reality</text>
    <text class="cardSub" x="2495" y="414">24 months is the high-intensity line</text>
    <text class="item" x="2495" y="462">- stable reality: 25-27 months</text>
    <text class="item" x="2495" y="498">- Gates are not optional</text>
    <text class="item" x="2495" y="534">- bad day fallback: code + commit + note</text>
    <text class="item" x="2495" y="570">- no route rewriting after one bad day</text>
  </g>

  <g>
    <rect class="card slate" x="120" y="825" width="520" height="270"/>
    <text class="cardTitle" x="155" y="875">Stage 0</text>
    <text class="cardSub" x="155" y="908">Week 0-4 - Execution reset</text>
    <text class="item" x="155" y="950">- Git / GitHub workflow</text>
    <text class="item" x="155" y="984">- Python environment</text>
    <text class="item" x="155" y="1018">- tiny CLI with tests</text>
    <rect class="gate" x="155" y="1040" width="400" height="34"/>
    <text class="gateText" x="175" y="1063">Gate: 10 commits + README + pytest</text>
  </g>

  <g>
    <rect class="card cyan" x="690" y="825" width="520" height="270"/>
    <text class="cardTitle" x="725" y="875">Stage 1</text>
    <text class="cardSub" x="725" y="908">Month 1-3 - Python + CS basics</text>
    <text class="item" x="725" y="950">- CLI tools / logging / pytest</text>
    <text class="item" x="725" y="984">- process, thread, file, permission</text>
    <text class="item" x="725" y="1018">- HTTP, DNS, TCP basics</text>
    <rect class="gate" x="725" y="1040" width="410" height="34"/>
    <text class="gateText" x="745" y="1063">Gate: 2 English READMEs</text>
  </g>

  <g>
    <rect class="card purple" x="1260" y="825" width="520" height="270"/>
    <text class="cardTitle" x="1295" y="875">Go Warm-up</text>
    <text class="cardSub" x="1295" y="908">1 week before Stage 2</text>
    <text class="item" x="1295" y="950">- Go Tour basics</text>
    <text class="item" x="1295" y="984">- 3 functions + table tests</text>
    <text class="item" x="1295" y="1018">- tiny JSON and HTTP handler</text>
    <rect class="gate" x="1295" y="1040" width="400" height="34"/>
    <text class="gateText" x="1315" y="1063">Gate: Python errors vs Go errors</text>
  </g>

  <g>
    <rect class="card blue" x="1830" y="825" width="520" height="270"/>
    <text class="cardTitle" x="1865" y="875">Stage 2</text>
    <text class="cardSub" x="1865" y="908">Month 4-7 - Go HTTP service</text>
    <text class="item" x="1865" y="950">- handler / middleware / context</text>
    <text class="item" x="1865" y="984">- explicit error handling</text>
    <text class="item" x="1865" y="1018">- Docker and API docs</text>
    <rect class="gate" x="1865" y="1040" width="400" height="34"/>
    <text class="gateText" x="1885" y="1063">Gate: Go service from zero</text>
  </g>

  <g>
    <rect class="card green" x="2400" y="825" width="680" height="270"/>
    <text class="cardTitle" x="2435" y="875">Stage 3</text>
    <text class="cardSub" x="2435" y="908">Month 8-10 - Backend loop</text>
    <text class="item" x="2435" y="950">- PostgreSQL schema / index / transaction</text>
    <text class="item" x="2435" y="984">- Redis queue / worker / retry / idempotency</text>
    <text class="item" x="2435" y="1018">- integration tests and Docker Compose</text>
    <rect class="gate" x="2435" y="1040" width="500" height="34"/>
    <text class="gateText" x="2455" y="1063">Gate: DB + Redis + tests + English API docs</text>
  </g>

  <g>
    <rect class="card amber" x="120" y="1150" width="680" height="270"/>
    <text class="cardTitle" x="155" y="1200">Stage 4</text>
    <text class="cardSub" x="155" y="1233">Month 11-13 - Linux and network debugging</text>
    <text class="item" x="155" y="1275">- curl / dig / ss / lsof / journalctl</text>
    <text class="item" x="155" y="1309">- DB / Redis / DNS / timeout failures</text>
    <text class="item" x="155" y="1343">- Fault Lab A: single-host and Docker</text>
    <rect class="gate" x="155" y="1365" width="470" height="34"/>
    <text class="gateText" x="175" y="1388">Gate: 6 English RCAs with evidence</text>
  </g>

  <g>
    <rect class="card purple" x="860" y="1150" width="680" height="270"/>
    <text class="cardTitle" x="895" y="1200">Stage 5</text>
    <text class="cardSub" x="895" y="1233">Month 14-17 - Containers and K8s</text>
    <text class="item" x="895" y="1275">- Pod / Deployment / Service / Ingress</text>
    <text class="item" x="895" y="1309">- probes / rollout / rollback</text>
    <text class="item" x="895" y="1343">- Fault Lab B: K8s runtime failures</text>
    <rect class="gate" x="895" y="1365" width="500" height="34"/>
    <text class="gateText" x="915" y="1388">Gate: 8 K8s fault stories</text>
  </g>

  <g>
    <rect class="card cyan" x="1600" y="1150" width="680" height="270"/>
    <text class="cardTitle" x="1635" y="1200">Stage 6</text>
    <text class="cardSub" x="1635" y="1233">Month 18-20 - Observability and SRE intro</text>
    <text class="item" x="1635" y="1275">- Prometheus / Grafana / Loki / Jaeger</text>
    <text class="item" x="1635" y="1309">- metrics + logs + traces correlation</text>
    <text class="item" x="1635" y="1343">- runbook / load test / SLO basics</text>
    <rect class="gate" x="1635" y="1365" width="530" height="34"/>
    <text class="gateText" x="1655" y="1388">Gate: 3 deep English stories</text>
  </g>

  <g>
    <rect class="card slate" x="2340" y="1150" width="740" height="270"/>
    <text class="cardTitle" x="2375" y="1200">Stage 7</text>
    <text class="cardSub" x="2375" y="1233">Month 21-24 / 27 - Cloud, IaC, CI/CD</text>
    <text class="item" x="2375" y="1275">- AWS or GCP, not both</text>
    <text class="item" x="2375" y="1309">- Terraform basics and GitHub Actions</text>
    <text class="item" x="2375" y="1343">- release records, rollback, risk list</text>
    <rect class="gate" x="2375" y="1365" width="510" height="34"/>
    <text class="gateText" x="2395" y="1388">Gate: resume-ready evidence</text>
  </g>

  <g>
    <rect class="card green" x="120" y="1610" width="620" height="430"/>
    <text class="cardTitle" x="155" y="1660">Core Project 1</text>
    <text class="cardSub" x="155" y="1693">Python Tool Project</text>
    <text class="item" x="155" y="1740">- log analyzer or health checker</text>
    <text class="item" x="155" y="1776">- CLI arguments and error handling</text>
    <text class="item" x="155" y="1812">- pytest for core logic</text>
    <text class="item" x="155" y="1848">- English README and run log</text>
    <rect class="gate" x="155" y="1880" width="420" height="36"/>
    <text class="gateText" x="175" y="1904">Proves: scripting + testing + docs</text>
  </g>

  <g>
    <rect class="card blue" x="790" y="1610" width="620" height="430"/>
    <text class="cardTitle" x="825" y="1660">Core Project 2</text>
    <text class="cardSub" x="825" y="1693">Go Backend Project</text>
    <text class="item" x="825" y="1740">- Incident Tracker / Uptime Monitor</text>
    <text class="item" x="825" y="1776">- REST API + PostgreSQL + Redis</text>
    <text class="item" x="825" y="1812">- Docker Compose + CI</text>
    <text class="item" x="825" y="1848">- API docs and integration tests</text>
    <rect class="gate" x="825" y="1880" width="420" height="36"/>
    <text class="gateText" x="845" y="1904">Proves: backend engineering loop</text>
  </g>

  <g>
    <rect class="card purple" x="1460" y="1610" width="620" height="430"/>
    <text class="cardTitle" x="1495" y="1660">Core Project 3</text>
    <text class="cardSub" x="1495" y="1693">Observability + Fault Lab</text>
    <text class="item" x="1495" y="1740">- Fault Lab A/B with reproducible cases</text>
    <text class="item" x="1495" y="1776">- Prometheus, logs, traces, alerts</text>
    <text class="item" x="1495" y="1812">- RCA and runbook library</text>
    <text class="item" x="1495" y="1848">- P99 / error rate / saturation stories</text>
    <rect class="gate" x="1495" y="1880" width="430" height="36"/>
    <text class="gateText" x="1515" y="1904">Proves: debugging and reliability</text>
  </g>

  <g>
    <rect class="card amber" x="2130" y="1610" width="950" height="430"/>
    <text class="cardTitle" x="2165" y="1660">Delayed Advanced Layer</text>
    <text class="cardSub" x="2165" y="1693">Delayed, not deleted</text>
    <text class="item" x="2165" y="1740">- K8s Controller / Operator after K8s fault evidence</text>
    <text class="item" x="2165" y="1776">- eBPF after ordinary Linux debugging is solid</text>
    <text class="item" x="2165" y="1812">- Distributed systems after retry / timeout / idempotency pain</text>
    <text class="item" x="2165" y="1848">- Security after backend and K8s basics</text>
    <text class="item" x="2165" y="1884">- AI Infra only after serving, performance, capacity, failure evidence</text>
    <rect class="gate" x="2165" y="1920" width="560" height="36"/>
    <text class="gateText" x="2185" y="1944">Rule: no Gate, no keyword</text>
  </g>

  <g>
    <rect class="card red" x="120" y="2290" width="2960" height="150"/>
    <text class="cardTitle" x="155" y="2342">Resume Write-in Rules</text>
    <text class="item" x="155" y="2388">- Python requires a tested Python project. Go requires a Go HTTP service with tests and Docker. K8s requires deployment plus 5+ K8s fault cases.</text>
    <text class="item" x="155" y="2424">- Prometheus/Grafana requires at least one alert-to-evidence story. SRE requires RCA, runbook, SLO/SLI practice. AI Infra requires serving/performance/capacity evidence.</text>
  </g>

  <text class="small" x="1600" y="2528" text-anchor="middle">Principle: build advanced discipline through low-level tasks; never put unverified buzzwords on the resume.</text>
</svg>
