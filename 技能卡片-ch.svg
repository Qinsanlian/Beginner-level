<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="2600" viewBox="0 0 3200 2600" role="img" aria-label="技能卡片 v2.1">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      text{font-family:Inter,Arial,sans-serif}
      .title{font-size:56px;font-weight:900;fill:#f8fafc;letter-spacing:.3px}
      .subtitle{font-size:24px;fill:#cbd5e1}
      .section{font-size:22px;font-weight:850;fill:#f8fafc}
      .cardTitle{font-size:28px;font-weight:880;fill:#f8fafc}
      .cardSub{font-size:18px;font-weight:700;fill:#cbd5e1}
      .item{font-size:18px;fill:#e2e8f0}
      .small{font-size:15px;fill:#94a3b8}
      .gateText{font-size:17px;font-weight:800;fill:#fff7ed}
      .root{fill:#0f172a;stroke:#38bdf8;stroke-width:3;rx:34}
      .zone{fill-opacity:.16;stroke-width:2.5;rx:30}
      .card{stroke-width:2.4;rx:24;filter:url(#shadow)}
      .blue{fill:#172554;stroke:#60a5fa}.green{fill:#052e16;stroke:#86efac}.amber{fill:#3f2d0b;stroke:#facc15}.red{fill:#450a0a;stroke:#fca5a5}.purple{fill:#312e81;stroke:#c084fc}.cyan{fill:#164e63;stroke:#67e8f9}.slate{fill:#1e293b;stroke:#94a3b8}
      .gate{fill:#7f1d1d;stroke:#fca5a5;stroke-width:1.6;rx:12}
      .line{stroke:#64748b;stroke-width:2.5;fill:none;opacity:.55}
    </style>
  </defs>

  <rect width="3200" height="2600" fill="url(#bg)"/>

  <g opacity="0.14">
    <path d="M0 0H3200M0 100H3200M0 200H3200M0 300H3200M0 400H3200M0 500H3200M0 600H3200M0 700H3200M0 800H3200M0 900H3200M0 1000H3200M0 1100H3200M0 1200H3200M0 1300H3200M0 1400H3200M0 1500H3200M0 1600H3200M0 1700H3200M0 1800H3200M0 1900H3200M0 2000H3200M0 2100H3200M0 2200H3200M0 2300H3200M0 2400H3200M0 2500H3200M0 2600H3200" stroke="#334155"/>
    <path d="M0 0V2600M100 0V2600M200 0V2600M300 0V2600M400 0V2600M500 0V2600M600 0V2600M700 0V2600M800 0V2600M900 0V2600M1000 0V2600M1100 0V2600M1200 0V2600M1300 0V2600M1400 0V2600M1500 0V2600M1600 0V2600M1700 0V2600M1800 0V2600M1900 0V2600M2000 0V2600M2100 0V2600M2200 0V2600M2300 0V2600M2400 0V2600M2500 0V2600M2600 0V2600M2700 0V2600M2800 0V2600M2900 0V2600M3000 0V2600M3100 0V2600M3200 0V2600" stroke="#334155"/>
  </g>

  <rect class="root" x="720" y="60" width="1760" height="140" filter="url(#shadow)"/>
  <text class="title" x="1600" y="120" text-anchor="middle">落实版技能卡片 v2.1</text>
  <text class="subtitle" x="1600" y="162" text-anchor="middle">高上限 · 低泡沫 · 强证据 · 24-27 个月路线图</text>

  <rect class="zone" x="80" y="260" width="3040" height="430" fill="#1e3a8a" stroke="#60a5fa"/>
  <rect class="zone" x="80" y="735" width="3040" height="740" fill="#14532d" stroke="#86efac"/>
  <rect class="zone" x="80" y="1520" width="3040" height="650" fill="#4c1d95" stroke="#c084fc"/>
  <rect class="zone" x="80" y="2215" width="3040" height="280" fill="#7f1d1d" stroke="#fca5a5"/>

  <text class="section" x="115" y="300">基础约定</text>
  <text class="section" x="115" y="775">执行阶段</text>
  <text class="section" x="115" y="1560">证据项目与高阶延后层</text>
  <text class="section" x="115" y="2255">简历门禁与反泡沫规则</text>

  <g>
    <rect class="card blue" x="120" y="330" width="720" height="310"/>
    <text class="cardTitle" x="155" y="380">定位</text>
    <text class="cardSub" x="155" y="414">当前角色：训练中的零基础工程师</text>
    <text class="item" x="155" y="462">- 目标：初级后端/DevOps 方向入门</text>
    <text class="item" x="155" y="498">- 长期：后端基础设施与可靠性</text>
    <text class="item" x="155" y="534">- 接受低级切入</text>
    <text class="item" x="155" y="570">- 低级任务必须以高标准完成</text>
  </g>

  <g>
    <rect class="card green" x="900" y="330" width="720" height="310"/>
    <text class="cardTitle" x="935" y="380">全局硬前置</text>
    <text class="cardSub" x="935" y="414">英文 + 证据 + 交付纪律</text>
    <text class="item" x="935" y="462">- README / issue 笔记 / API 文档 / RCA</text>
    <text class="item" x="935" y="498">- 仓库链接 / 提交记录 / 测试 / 运行日志</text>
    <text class="item" x="935" y="534">- 限制说明与排障笔记</text>
    <text class="item" x="935" y="570">- 每个关键项目必须能用英文讲解</text>
  </g>

  <g>
    <rect class="card red" x="1680" y="330" width="720" height="310"/>
    <text class="cardTitle" x="1715" y="380">AI 使用纪律</text>
    <text class="cardSub" x="1715" y="414">AI 是教练、审查员和练习对手</text>
    <text class="item" x="1715" y="462">- 允许：解释、审查、测试思路、模拟面试</text>
    <text class="item" x="1715" y="498">- 禁止：一键生成完整项目</text>
    <text class="item" x="1715" y="534">- 禁止：无法解释的代码</text>
    <text class="item" x="1715" y="570">- 调用 LLM API 不等于 AI Infra</text>
  </g>

  <g>
    <rect class="card amber" x="2460" y="330" width="620" height="310"/>
    <text class="cardTitle" x="2495" y="380">时间现实</text>
    <text class="cardSub" x="2495" y="414">24 个月是高强度目标线</text>
    <text class="item" x="2495" y="462">- 稳定现实：25-27 个月</text>
    <text class="item" x="2495" y="498">- 门禁不可绕过</text>
    <text class="item" x="2495" y="534">- 状态差时的保底：代码 + 提交 + 笔记</text>
    <text class="item" x="2495" y="570">- 一天不顺不重写路线</text>
  </g>

  <g>
    <rect class="card slate" x="120" y="825" width="520" height="270"/>
    <text class="cardTitle" x="155" y="875">阶段 0</text>
    <text class="cardSub" x="155" y="908">第 0-4 周 - 执行系统重置</text>
    <text class="item" x="155" y="950">- Git / GitHub 工作流</text>
    <text class="item" x="155" y="984">- Python 环境</text>
    <text class="item" x="155" y="1018">- 极小 CLI 加测试</text>
    <rect class="gate" x="155" y="1040" width="400" height="34"/>
    <text class="gateText" x="175" y="1063">门禁：10 次提交 + README + pytest</text>
  </g>

  <g>
    <rect class="card cyan" x="690" y="825" width="520" height="270"/>
    <text class="cardTitle" x="725" y="875">阶段 1</text>
    <text class="cardSub" x="725" y="908">第 1-3 个月 - Python + 计算机基础</text>
    <text class="item" x="725" y="950">- CLI 工具 / 日志 / pytest</text>
    <text class="item" x="725" y="984">- 进程、线程、文件、权限</text>
    <text class="item" x="725" y="1018">- HTTP、DNS、TCP 基础</text>
    <rect class="gate" x="725" y="1040" width="410" height="34"/>
    <text class="gateText" x="745" y="1063">门禁：2 个英文 README</text>
  </g>

  <g>
    <rect class="card purple" x="1260" y="825" width="520" height="270"/>
    <text class="cardTitle" x="1295" y="875">Go 预热</text>
    <text class="cardSub" x="1295" y="908">阶段 2 前 1 周</text>
    <text class="item" x="1295" y="950">- Go 官方指南基础</text>
    <text class="item" x="1295" y="984">- 3 个函数 + 表驱动测试</text>
    <text class="item" x="1295" y="1018">- 极小 JSON 和 HTTP 处理</text>
    <rect class="gate" x="1295" y="1040" width="400" height="34"/>
    <text class="gateText" x="1315" y="1063">门禁：Python 错误 vs Go 错误</text>
  </g>

  <g>
    <rect class="card blue" x="1830" y="825" width="520" height="270"/>
    <text class="cardTitle" x="1865" y="875">阶段 2</text>
    <text class="cardSub" x="1865" y="908">第 4-7 个月 - Go HTTP 服务</text>
    <text class="item" x="1865" y="950">- handler / 中间件 / context</text>
    <text class="item" x="1865" y="984">- 显式错误处理</text>
    <text class="item" x="1865" y="1018">- Docker 和 API 文档</text>
    <rect class="gate" x="1865" y="1040" width="400" height="34"/>
    <text class="gateText" x="1885" y="1063">门禁：从零写 Go 服务</text>
  </g>

  <g>
    <rect class="card green" x="2400" y="825" width="680" height="270"/>
    <text class="cardTitle" x="2435" y="875">阶段 3</text>
    <text class="cardSub" x="2435" y="908">第 8-10 个月 - 后端闭环</text>
    <text class="item" x="2435" y="950">- PostgreSQL 表结构 / 索引 / 事务</text>
    <text class="item" x="2435" y="984">- Redis 队列 / worker / 重试 / 幂等</text>
    <text class="item" x="2435" y="1018">- 集成测试与 Docker Compose</text>
    <rect class="gate" x="2435" y="1040" width="500" height="34"/>
    <text class="gateText" x="2455" y="1063">门禁：DB + Redis + 测试 + 英文 API 文档</text>
  </g>

  <g>
    <rect class="card amber" x="120" y="1150" width="680" height="270"/>
    <text class="cardTitle" x="155" y="1200">阶段 4</text>
    <text class="cardSub" x="155" y="1233">第 11-13 个月 - Linux 与网络排障</text>
    <text class="item" x="155" y="1275">- curl / dig / ss / lsof / journalctl</text>
    <text class="item" x="155" y="1309">- DB / Redis / DNS / 超时故障</text>
    <text class="item" x="155" y="1343">- 故障实验室 A：单机与 Docker</text>
    <rect class="gate" x="155" y="1365" width="470" height="34"/>
    <text class="gateText" x="175" y="1388">门禁：6 篇带证据的英文 RCA</text>
  </g>

  <g>
    <rect class="card purple" x="860" y="1150" width="680" height="270"/>
    <text class="cardTitle" x="895" y="1200">阶段 5</text>
    <text class="cardSub" x="895" y="1233">第 14-17 个月 - 容器与 K8s</text>
    <text class="item" x="895" y="1275">- Pod / Deployment / Service / Ingress</text>
    <text class="item" x="895" y="1309">- 探针 / 滚动更新 / 回滚</text>
    <text class="item" x="895" y="1343">- 故障实验室 B：K8s 运行时故障</text>
    <rect class="gate" x="895" y="1365" width="500" height="34"/>
    <text class="gateText" x="915" y="1388">门禁：8 个 K8s 故障案例</text>
  </g>

  <g>
    <rect class="card cyan" x="1600" y="1150" width="680" height="270"/>
    <text class="cardTitle" x="1635" y="1200">阶段 6</text>
    <text class="cardSub" x="1635" y="1233">第 18-20 个月 - 可观测性与 SRE 入门</text>
    <text class="item" x="1635" y="1275">- Prometheus / Grafana / Loki / Jaeger</text>
    <text class="item" x="1635" y="1309">- 指标 + 日志 + 链路关联</text>
    <text class="item" x="1635" y="1343">- runbook / 负载测试 / SLO 基础</text>
    <rect class="gate" x="1635" y="1365" width="530" height="34"/>
    <text class="gateText" x="1655" y="1388">门禁：3 篇深度英文案例</text>
  </g>

  <g>
    <rect class="card slate" x="2340" y="1150" width="740" height="270"/>
    <text class="cardTitle" x="2375" y="1200">阶段 7</text>
    <text class="cardSub" x="2375" y="1233">第 21-24/27 个月 - 云、IaC、CI/CD</text>
    <text class="item" x="2375" y="1275">- AWS 或 GCP，不同时学两朵云</text>
    <text class="item" x="2375" y="1309">- Terraform 基础与 GitHub Actions</text>
    <text class="item" x="2375" y="1343">- 发布记录、回滚、风险清单</text>
    <rect class="gate" x="2375" y="1365" width="510" height="34"/>
    <text class="gateText" x="2395" y="1388">门禁：简历就绪证据</text>
  </g>

  <g>
    <rect class="card green" x="120" y="1610" width="620" height="430"/>
    <text class="cardTitle" x="155" y="1660">核心项目 1</text>
    <text class="cardSub" x="155" y="1693">Python 工具项目</text>
    <text class="item" x="155" y="1740">- 日志分析器或健康检查器</text>
    <text class="item" x="155" y="1776">- CLI 参数与错误处理</text>
    <text class="item" x="155" y="1812">- 用 pytest 测试核心逻辑</text>
    <text class="item" x="155" y="1848">- 英文 README 与运行日志</text>
    <rect class="gate" x="155" y="1880" width="420" height="36"/>
    <text class="gateText" x="175" y="1904">证明：脚本 + 测试 + 文档</text>
  </g>

  <g>
    <rect class="card blue" x="790" y="1610" width="620" height="430"/>
    <text class="cardTitle" x="825" y="1660">核心项目 2</text>
    <text class="cardSub" x="825" y="1693">Go 后端项目</text>
    <text class="item" x="825" y="1740">- 事故追踪器 / 运行时间监控</text>
    <text class="item" x="825" y="1776">- REST API + PostgreSQL + Redis</text>
    <text class="item" x="825" y="1812">- Docker Compose + CI</text>
    <text class="item" x="825" y="1848">- API 文档与集成测试</text>
    <rect class="gate" x="825" y="1880" width="420" height="36"/>
    <text class="gateText" x="845" y="1904">证明：后端工程闭环</text>
  </g>

  <g>
    <rect class="card purple" x="1460" y="1610" width="620" height="430"/>
    <text class="cardTitle" x="1495" y="1660">核心项目 3</text>
    <text class="cardSub" x="1495" y="1693">可观测性与故障实验室</text>
    <text class="item" x="1495" y="1740">- 可复现的故障实验室 A/B</text>
    <text class="item" x="1495" y="1776">- Prometheus、日志、链路、告警</text>
    <text class="item" x="1495" y="1812">- RCA 与 runbook 库</text>
    <text class="item" x="1495" y="1848">- P99 / 错误率 / 资源饱和案例</text>
    <rect class="gate" x="1495" y="1880" width="430" height="36"/>
    <text class="gateText" x="1515" y="1904">证明：排障与可靠性</text>
  </g>

  <g>
    <rect class="card amber" x="2130" y="1610" width="950" height="430"/>
    <text class="cardTitle" x="2165" y="1660">高阶延后层</text>
    <text class="cardSub" x="2165" y="1693">延后，而非删除</text>
    <text class="item" x="2165" y="1740">- K8s Controller/Operator：在积累 K8s 故障证据之后</text>
    <text class="item" x="2165" y="1776">- eBPF：在常规 Linux 排障扎实之后</text>
    <text class="item" x="2165" y="1812">- 分布式系统：在踩过重试/超时/幂等的坑之后</text>
    <text class="item" x="2165" y="1848">- 安全工程：在后端与 K8s 基础具备之后</text>
    <text class="item" x="2165" y="1884">- AI Infra：仅在具备服务、性能、容量、故障证据之后</text>
    <rect class="gate" x="2165" y="1920" width="560" height="36"/>
    <text class="gateText" x="2185" y="1944">规则：无门禁，无关键词</text>
  </g>

  <g>
    <rect class="card red" x="120" y="2290" width="2960" height="150"/>
    <text class="cardTitle" x="155" y="2342">简历写入规则</text>
    <text class="item" x="155" y="2388">- 写 Python 需有经过测试的 Python 项目。写 Go 需有带测试和 Docker 的 Go HTTP 服务。写 K8s 需有部署经验加 5 个以上 K8s 故障案例。</text>
    <text class="item" x="155" y="2424">- 写 Prometheus/Grafana 需至少一个从告警到证据的案例。写 SRE 需有 RCA、runbook、SLO/SLI 实践。写 AI Infra 需有服务/性能/容量证据。</text>
  </g>

  <text class="small" x="1600" y="2528" text-anchor="middle">原则：用低级任务练出高级纪律；绝不把未经验证的流行词放上简历。</text>
</svg>
